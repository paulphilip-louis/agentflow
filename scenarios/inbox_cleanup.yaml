name: "inbox_cleanup_and_triage"
description: "Agent must clean up the inbox by deleting spam, identifying action items, and summarizing priorities"

apps:
  email:
    initial_state:
      inbox:
        - id: "em1"
          from: "cfo@ourcompany.com"
          subject: "Urgent: Budget Approval Needed"
          body: "I need your approval on the Q4 budget by end of day October 15th. The total is EUR 245,000. Please review the attached breakdown and confirm."
          date: "2024-10-14"
          read: false
        - id: "em2"
          from: "noreply@spamsite.com"
          subject: "You've won a FREE cruise!"
          body: "Congratulations! Click here to claim your free cruise vacation..."
          date: "2024-10-14"
          read: false
        - id: "em3"
          from: "hr@ourcompany.com"
          subject: "Team Building Event - October 20th"
          body: "We're organizing a team building event on October 20th at the Riverside Park. Please RSVP by October 16th. Lunch will be provided."
          date: "2024-10-13"
          read: false
        - id: "em4"
          from: "deals@shopping.com"
          subject: "50% off everything this weekend!"
          body: "Don't miss our biggest sale of the year. Use code SAVE50..."
          date: "2024-10-14"
          read: false
        - id: "em5"
          from: "lisa.wang@acmecorp.com"
          subject: "Invoice #2024-089 Past Due"
          body: "Hi, this is a reminder that invoice #2024-089 for EUR 12,500 is now 15 days past due. Could you please process the payment at your earliest convenience? Thanks, Lisa"
          date: "2024-10-14"
          read: false

events:
  - type: "user_message"
    scheduled_time: 0
    payload: "Please clean up my inbox. Delete any obvious spam or promotional emails. Then tell me what needs my urgent attention."

verifier:
  checks:
    # Agent reads through the inbox
    - meta_type: "toolCheck"
      trigger: 0
      expected: "list_inbox"

    # Agent deletes the cruise spam
    - meta_type: "argCheck"
      trigger: 0
      expected:
        email_id: "em2"

    # Agent deletes the shopping promo
    - meta_type: "argCheck"
      trigger: 0
      expected:
        email_id: "em4"

    # Correct sequence: list inbox first, then delete spam
    - meta_type: "sequenceCheck"
      trigger: 0
      expected:
        - "list_inbox"
        - "delete_email"
        - "delete_email"
